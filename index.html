<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1538">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MINA Operación">
  <title>MINA · Operación Patrimonial</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="preload" href="fonts/manrope-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" aria-live="polite"></div>

  <div id="prospectDialog" class="dialog-backdrop" hidden>
    <section class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
      <header class="dialog__header">
        <div>
          <p class="eyebrow" id="dialogEyebrow">Nueva tarjeta</p>
          <h2 id="dialogTitle">Activar una relación</h2>
        </div>
        <button class="icon-button" data-close-dialog aria-label="Cerrar">×</button>
      </header>

      <form id="prospectForm">
        <button class="photo-capture" id="photoTrigger" type="button">
          <span id="photoPreview" class="photo-capture__preview">◎</span>
          <span><strong>Fotografiar la tarjeta</strong><small>Usa la cámara trasera del teléfono</small></span>
        </button>
        <input id="photoInput" type="file" accept="image/*" capture="environment" hidden>

        <div class="form-grid">
          <label class="field"><span>Nombre</span><input id="nameInput" autocomplete="name" required placeholder="Dra. / Dr."></label>
          <label class="field"><span>Especialidad</span><input id="specialtyInput" required placeholder="Ej. Cardiología"></label>
          <label class="field"><span>Clínica u organización</span><input id="organizationInput" placeholder="Opcional"></label>
          <label class="field"><span>Etapa actual</span><select id="stageInput"><option>Por investigar</option><option>Por contactar</option><option>Contactado</option><option>Respondió</option><option>Reunión</option><option>Oportunidad</option><option>Pausado</option></select></label>
          <label class="field"><span>Cómo obtuvimos la tarjeta</span><select id="sourceInput"><option>Entregada por secretaria</option><option>Entregada por el doctor</option><option>Tomada del mostrador</option><option>Referencia</option><option>Otro</option></select></label>
          <label class="field"><span>Responsable</span><select id="ownerInput"><option>Alejandro</option><option>Mario</option><option>Ambos</option></select></label>
          <label class="field"><span>Teléfono</span><input id="phoneInput" type="tel" autocomplete="tel" inputmode="tel" placeholder="Opcional"></label>
          <label class="field"><span>Correo</span><input id="emailInput" type="email" autocomplete="email" inputmode="email" placeholder="Opcional"></label>
          <label class="field"><span>Piso o ubicación</span><input id="locationInput" placeholder="Ej. Piso 8 · Consultorio 804"></label>
          <label class="field"><span>Siguiente acción</span><input id="nextActionInput" required value="Investigar y preparar acercamiento"></label>
          <label class="field"><span>Fecha de seguimiento</span><input id="dueDateInput" type="date" required></label>
          <label class="field"><span>Cita confirmada</span><input id="appointmentInput" type="datetime-local"></label>
          <label class="field field--full"><span>Contexto de campo</span><textarea id="contextInput" rows="3" placeholder="Quién entregó la tarjeta, qué conversaron y cualquier detalle útil…"></textarea></label>
        </div>

        <footer class="dialog__actions">
          <button class="button button--quiet" type="button" data-close-dialog>Cancelar</button>
          <button class="button button--primary" id="saveProspectButton" type="submit">Guardar y crear seguimiento</button>
        </footer>
      </form>
    </section>
  </div>

  <div id="moveDialog" class="dialog-backdrop" hidden>
    <section class="dialog dialog--small" role="dialog" aria-modal="true" aria-labelledby="moveTitle">
      <header class="dialog__header"><div><p class="eyebrow">Cambiar etapa</p><h2 id="moveTitle">Mover prospecto</h2></div><button class="icon-button" data-close-move aria-label="Cerrar">×</button></header>
      <div id="moveOptions" class="move-options"></div>
    </section>
  </div>

  <div id="summaryDialog" class="dialog-backdrop" hidden>
    <section class="dialog" role="dialog" aria-modal="true" aria-labelledby="summaryName">
      <header class="dialog__header">
        <div><p class="eyebrow" id="summaryEyebrow">Ficha del prospecto</p><h2 id="summaryName">—</h2></div>
        <button class="icon-button" data-close-summary aria-label="Cerrar">×</button>
      </header>
      <div id="summaryBody" class="summary-body"></div>
      <footer class="dialog__actions" id="summaryActions"></footer>
    </section>
  </div>

  <div id="connectionDialog" class="dialog-backdrop" hidden>
    <section class="dialog dialog--small" role="dialog" aria-modal="true" aria-labelledby="connectionTitle">
      <header class="dialog__header">
        <div><p class="eyebrow">Acceso compartido</p><h2 id="connectionTitle">Conectar con MINA</h2></div>
      </header>
      <form id="connectionForm">
        <div class="connection-copy">
          <p>Usa la clave compartida para sincronizar el pipeline entre Alejandro y Mario.</p>
        </div>
        <div class="form-grid form-grid--single">
          <label class="field"><span>Quién está usando el CRM</span><select id="actorInput"><option>Alejandro</option><option>Mario</option></select></label>
          <label class="field"><span>Clave de acceso</span><input id="apiKeyInput" type="password" autocomplete="current-password" required placeholder="Clave compartida"></label>
        </div>
        <p class="connection-error" id="connectionError" hidden></p>
        <footer class="dialog__actions"><button class="button button--primary" type="submit">Conectar y sincronizar</button></footer>
      </form>
    </section>
  </div>

  <div id="toast" class="toast" role="status" hidden></div>

  <script src="src/config.js"></script>
  <script type="module" src="src/app.js"></script>
</body>
</html>
